<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stock Form</title>

<style>
body {
  font-family: Arial, Helvetica, sans-serif;
  background: #fffaf0;
}

* { box-sizing: border-box; }

.container {
  max-width: 600px;
  margin: 40px auto;
  background-color: #ffe4b5;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
}

label {
  font-weight: bold;
}

input[type=text],
input[type=file],
input[type=number],
select {
  width: 100%;
  padding: 10px;
  margin: 8px 0 15px 0;
  border: 1px solid #ccc;
  border-radius: 6px;
}

input[type=submit] {
  width: 100%;
  background-color: #f4a460;
  color: white;
  padding: 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
}

input[type=submit]:hover {
  background-color: #d2691e;
}

.nav-btn {
  margin-bottom: 15px;
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #333;
  color: white;
}
</style>
</head>

<body>

<div class="container">

<h2>Stock Management</h2>

<form action="/Stock">
  <button class="nav-btn">View Stock</button>
</form>

<form action="/Add" method="POST" enctype="multipart/form-data">

  <label>Image</label>
  <input type="file" name="file" accept="image/*" required>

  <label>Name</label>
  <input type="text" name="Name" placeholder="Product Name" required>

  <label>Code</label>
  <input type="text"
         id="code"
         name="Code"
         placeholder="Product Code"
         required
         pattern="[0-9]+"
         title="Numbers only">

  <label>Low Price</label>
  <input type="text" name="LowPrice" placeholder="Low Price" required>

  <label>High Price</label>
  <input type="text" name="HighPrice" placeholder="High Price" required>

  <label>Source</label>
  <select name="Source" required>
    <option value="Indoor">Indoor</option>
    <option value="Outdoor">Outdoor</option>
  </select>

  <input type="submit" value="Add To Stock">

</form>

</div>

<script>
document.getElementById("code").addEventListener("input", function () {
    this.value = this.value.replace(/[^0-9]/g, '');
});
</script>

</body>
</html>
